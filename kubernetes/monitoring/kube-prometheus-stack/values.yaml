grafana:
  enabled: true
  adminPassword: "admin" 
  
  readinessProbe:
    initialDelaySeconds: 60
    timeoutSeconds: 10
    periodSeconds: 10
    failureThreshold: 5
  livenessProbe:
    initialDelaySeconds: 90
    timeoutSeconds: 10
    periodSeconds: 10
    failureThreshold: 10

  resources:
    requests:
      memory: "250Mi"
      cpu: "100m"
    limits:
      memory: "500Mi"
      cpu: "200m"

  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
      external-dns.alpha.kubernetes.io/hostname: grafana.baashe.uk
    hosts:
      - grafana.baashe.uk
    tls:
      - secretName: grafana-tls
        hosts:
          - grafana.baashe.uk

  persistence:
    enabled: false

prometheus:
  enabled: true
  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
      external-dns.alpha.kubernetes.io/hostname: prometheus.baashe.uk
    hosts:
      - prometheus.baashe.uk
    tls:
      - secretName: prometheus-tls
        hosts:
          - prometheus.baashe.uk

  prometheusSpec:
    retention: 1d 
    resources:
      requests:
        memory: "300Mi"
        cpu: "100m"
      limits:
        memory: "500Mi"
        cpu: "300m"
    
    storageSpec:
      emptyDir:
        medium: Memory